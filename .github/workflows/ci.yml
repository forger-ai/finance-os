name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: finance-os-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Backend verify
        working-directory: backend
        run: |
          cp ../commons/backend/database.py src/app/database.py
          cp ../commons/backend/health.py src/app/health.py
          cp ../commons/backend/cors.py src/app/cors.py
          cp ../commons/backend/forger_desktop.py src/app/forger_desktop.py
          cp ../commons/backend/mcp_runtime.py src/app/mcp_runtime.py
          uv sync
          uv run python scripts/verify.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Frontend verify + build
        working-directory: frontend
        run: |
          cp ../commons/frontend/client.ts src/api/client.ts
          npm install
          npm run verify
          npm run build
